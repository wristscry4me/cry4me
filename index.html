<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cry 4 me</title>
    <style>
        /* Базовые настройки: строгий черный фон и гладкая белая Гельветика */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        a {
            color: #ffffff; 
            text-decoration: none;
            transition: opacity 0.2s;
        }

        a:hover {
            opacity: 0.6; 
        }

        /* Центрированный контейнер */
        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 20px 50px 20px;
            background-color: #121212; 
            min-height: 100vh;
        }

        /* Шапка / Баннер */
        .header-banner {
            width: 100%;
            height: 180px;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .header-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Навигация под баннером */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links {
            font-size: 14px;
            font-weight: bold;
        }

        #lang-toggle {
            background: none;
            border: 1px solid #555;
            color: #fff;
            padding: 5px 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        #lang-toggle:hover {
            border-color: #fff;
            background: #fff;
            color: #000;
        }

        /* ДВЕ КОЛОНКИ */
        .main-content {
            display: flex;
            gap: 40px;
        }

        .left-column {
            flex: 1;
        }

        .right-column {
            width: 260px;
            flex-shrink: 0;
        }

        /* СЕТКА МУЗЫКИ */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .album-item {
            display: flex;
            flex-direction: column;
        }

        .album-cover {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #1a1a1a;
            border: 1px solid #222;
            margin-bottom: 10px;
            position: relative;
            transition: transform 0.3s ease;
        }

        .album-item:hover .album-cover {
            transform: translateY(-5px);
        }

        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-title {
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .album-artist {
            font-size: 12px;
            color: #888;
        }

        /* САЙДБАР АРТИСТА */
        .profile-pic {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #1a1a1a;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .artist-name {
            margin: 0 0 5px 0;
            font-size: 24px;
            color: #fff;
            letter-spacing: 2px;
            font-weight: normal;
        }

        .location {
            color: #888;
            font-size: 12px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Кнопка скачивания */
        .download-btn {
            display: block;
            text-align: center;
            background-color: #fff;
            color: #000 !important;
            font-weight: bold;
            padding: 12px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 12px;
            transition: 0.3s;
        }

        .download-btn:hover {
            background-color: #ccc;
            opacity: 1;
        }

        /* Ссылки соцсетей */
        .socials {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 13px; /* Вернул мелкий размер */
            letter-spacing: 0.5px;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column-reverse;
            }
            .right-column {
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .profile-pic {
                width: 180px;
            }
            .music-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header-banner">
            <img src="banner.jpg" alt="" onerror="this.style.display='none'">
        </div>

        <nav class="top-nav">
            <div class="nav-links">
                <span id="nav-music">music</span>
            </div>
            <button id="lang-toggle">RU / EN</button>
        </nav>

        <div class="main-content">
            
            <div class="left-column">
                <div class="music-grid">
                    
                    <!-- АЛЬБОМ 1 -->
                    <div class="album-item">
                        <a href="#">
                            <div class="album-cover"><img src="cover1.jpg" alt="" onerror="this.style.display='none'"></div>
                            <div class="album-title">Album 1</div>
                            <div class="album-artist">cry 4 me</div>
                        </a>
                    </div>
                    
                    <!-- АЛЬБОМ 2 -->
                    <div class="album-item">
                        <a href="#">
                            <div class="album-cover"><img src="cover2.jpg" alt="" onerror="this.style.display='none'"></div>
                            <div class="album-title">Album 2</div>
                            <div class="album-artist">cry 4 me</div>
                        </a>
                    </div>

                    <!-- АЛЬБОМ 3 -->
                    <div class="album-item">
                        <a href="#">
                            <div class="album-cover"><img src="cover3.jpg" alt="" onerror="this.style.display='none'"></div>
                            <div class="album-title">Album 3</div>
                            <div class="album-artist">cry 4 me</div>
                        </a>
                    </div>

                </div>
            </div>

            <div class="right-column">
                <img src="profile.jpg" alt="cry 4 me" class="profile-pic" onerror="this.style.display='none'">
                
                <h1 class="artist-name">cry 4 me</h1>
                <div class="location" id="text-location">Worldwide</div>

                <a href="discography.zip" class="download-btn" id="btn-download" download>Download Discography</a>

                <div class="socials">
                    <a href="https://open.spotify.com/artist/3YSO9ev7YtOt3eiqHyNYwW" target="_blank">spotify</a>
                    <a href="https://soundcloud.com/cryforrme" target="_blank">soundcloud</a>
                    <a href="https://t.me/mywristscryforme" target="_blank">telegram</a>
                    <a href="mailto:info@cry4me.com">info@cry4me.com</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentLang = 'en'; 
        const langToggle = document.getElementById('lang-toggle');
        const navMusic = document.getElementById('nav-music');
        const textLocation = document.getElementById('text-location');
        const btnDownload = document.getElementById('btn-download');

        const dict = {
            ru: { music: "музыка", location: "Весь мир", download: "Скачать дискографию" },
            en: { music: "music", location: "Worldwide", download: "Download Discography" }
        };

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ru' : 'en';
            navMusic.innerText = dict[currentLang].music;
            textLocation.innerText = dict[currentLang].location;
            btnDownload.innerText = dict[currentLang].download;
        });
    </script>
</body>
</html>
