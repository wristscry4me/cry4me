<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cry 4 me</title>
    <style>
        /* Идеально гладкий шрифт и фон */
        body {
            margin: 0;
            padding: 0;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased; /* Убирает "пиксельность" шрифта */
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: 1.5px; /* Красивое расстояние между буквами */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #050505; /* Заглушка, пока не загрузится картинка */
            position: relative;
            overflow-x: hidden;
        }

        /* ЗАМЫЛЕННЫЙ ФОН */
        body::before {
            content: "";
            position: fixed;
            top: -5%; 
            left: -5%; 
            width: 110%; 
            height: 110%; /* Делаем чуть больше экрана, чтобы края размытия не обрезались */
            background-image: url('bg.jpg'); /* Сюда подтянется твоя картинка */
            background-size: cover;
            background-position: center;
            filter: blur(25px) brightness(0.35); /* Сильное размытие и затемнение */
            z-index: -1; /* Отправляем на самый задний план */
        }

        /* Шапка */
        header {
            width: 100%;
            max-width: 1000px; /* Сделали сайт шире */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 4px; /* Еще больше расстояния для логотипа */
            font-weight: 300; /* Более тонкий и стильный вес шрифта */
            text-transform: lowercase;
        }

        /* Кнопка смены языка */
        #lang-toggle {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            padding: 8px 15px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 2px;
            transition: 0.4s ease;
            font-size: 0.8rem;
            border-radius: 3px;
        }
        
        #lang-toggle:hover {
            background: #fff;
            color: #000;
        }

        /* Основной контент */
        main {
            text-align: center;
            margin-top: 40px;
            width: 100%;
            max-width: 1000px; /* Широкий контейнер для огромных обложек */
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Социальные сети */
        .socials {
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .socials a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: color 0.4s ease;
        }

        .socials a:hover {
            color: #fff;
        }

        /* Главные кнопки */
        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); /* Эффект стекла для кнопок */
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 18px 40px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.4s ease;
            letter-spacing: 2px;
            border-radius: 3px;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        /* ОГРОМНАЯ СЕТКА РЕЛИЗОВ */
        .releases-grid {
            display: none; /* Скрыта до клика */
            grid-template-columns: repeat(2, 1fr); /* 2 огромные колонки на ПК */
            gap: 40px; /* Большое расстояние между альбомами */
            margin-bottom: 80px;
        }

        .releases-grid.active {
            display: grid;
        }

        /* Карточка альбома */
        .album {
            aspect-ratio: 1 / 1;
            background-color: rgba(0, 0, 0, 0.3); /* Полупрозрачный фон, если картинки нет */
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            position: relative;
            overflow: hidden;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Объемная тень */
        }

        .album img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 1; /* КАРТИНКА ЯРКАЯ ПО УМОЛЧАНИЮ */
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .album:hover img {
            opacity: 0.3; /* ЗАТЕМНЯЕТСЯ ПРИ НАВЕДЕНИИ */
            transform: scale(1.05); /* Легкое красивое увеличение при наведении */
        }

        .album-title {
            z-index: 1;
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0; /* ТЕКСТ СКРЫТ ПО УМОЛЧАНИЮ */
            transition: opacity 0.5s ease;
            text-align: center;
            padding: 0 20px;
        }

        .album:hover .album-title {
            opacity: 1; /* ТЕКСТ ПОЯВЛЯЕТСЯ ПРИ НАВЕДЕНИИ */
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .releases-grid {
                grid-template-columns: 1fr; /* 1 ОГРОМНАЯ колонка на телефоне */
                gap: 20px;
            }
            .actions {
                flex-direction: column;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>cry 4 me</h1>
        <button id="lang-toggle">RU / EN</button>
    </header>

    <main>
        <!-- Ссылки -->
        <div class="socials">
            <a href="https://open.spotify.com/artist/3YSO9ev7YtOt3eiqHyNYwW" target="_blank">Spotify</a>
            <a href="https://soundcloud.com/cryforrme" target="_blank">SoundCloud</a>
            <a href="https://t.me/mywristscryforme" target="_blank">Telegram</a>
            <a href="mailto:info@cry4me.com">Email</a>
        </div>

        <!-- Кнопки действий -->
        <div class="actions">
            <button class="btn" id="btn-releases">Релизы</button>
            <a href="discography.zip" class="btn" id="btn-download" download>Скачать всё</a>
        </div>

        <!-- Огромная сетка релизов -->
        <div class="releases-grid" id="grid">
            <a href="#" class="album">
                <img src="cover1.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 1</span>
            </a>
            <a href="#" class="album">
                <img src="cover2.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 2</span>
            </a>
            <a href="#" class="album">
                <img src="cover3.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 3</span>
            </a>
            <a href="#" class="album">
                <img src="cover4.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 4</span>
            </a>
            <a href="#" class="album">
                <img src="cover5.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 5</span>
            </a>
            <a href="#" class="album">
                <img src="cover6.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 6</span>
            </a>
            <a href="#" class="album">
                <img src="cover7.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 7</span>
            </a>
            <a href="#" class="album">
                <img src="cover8.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 8</span>
            </a>
            <a href="#" class="album">
                <img src="cover9.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 9</span>
            </a>
        </div>
    </main>

    <script>
        // ЛОГИКА ОТКРЫТИЯ РЕЛИЗОВ
        const btnReleases = document.getElementById('btn-releases');
        const grid = document.getElementById('grid');

        btnReleases.addEventListener('click', () => {
            grid.classList.toggle('active');
            
            // Если сетка открылась, плавно скроллим вниз к альбомам
            if(grid.classList.contains('active')) {
                setTimeout(() => {
                    grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            }
        });

        // ЛОГИКА СМЕНЫ ЯЗЫКА
        let currentLang = 'ru';
        const langToggle = document.getElementById('lang-toggle');
        const btnDownload = document.getElementById('btn-download');

        const dict = {
            ru: {
                releases: "РЕЛИЗЫ",
                download: "СКАЧАТЬ ВСЁ"
            },
            en: {
                releases: "RELEASES",
                download: "DOWNLOAD ALL"
            }
        };

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            
            btnReleases.innerText = dict[currentLang].releases;
            btnDownload.innerText = dict[currentLang].download;
        });
    </script>
</body>
</html>
