<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cry4me | Official Website</title>
    <style>
        /* Базовые стили */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace; /* Стильный моноширинный шрифт */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Шапка */
        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
        }

        /* Кнопка смены языка */
        #lang-toggle {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            padding: 5px 15px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
        }
        
        #lang-toggle:hover {
            background: #fff;
            color: #0a0a0a;
        }

        /* Основной контент */
        main {
            text-align: center;
            margin-top: 50px;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Социальные сети */
        .socials {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .socials a {
            color: #888;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .socials a:hover {
            color: #fff;
        }

        /* Главные кнопки */
        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .btn {
            background: #fff;
            color: #0a0a0a;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background: #888;
        }

        /* Сетка релизов */
        .releases-grid {
            display: none; /* Скрыта по умолчанию */
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .releases-grid.active {
            display: grid;
        }

        .album {
            aspect-ratio: 1 / 1;
            background-color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .album img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.5; /* Затемняем картинку по умолчанию */
            transition: 0.3s;
        }

        .album:hover img {
            opacity: 1; /* При наведении делаем яркой */
        }

        .album-title {
            z-index: 1;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            opacity: 1;
            transition: 0.3s;
        }

        .album:hover .album-title {
            opacity: 0; /* Прячем текст при наведении, показываем обложку */
        }

        /* Мобильная адаптация */
        @media (max-width: 600px) {
            .releases-grid {
                grid-template-columns: 1fr; /* Одна колонка на телефонах */
            }
            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>cry4me</h1>
        <button id="lang-toggle">RU / EN</button>
    </header>

    <main>
        <!-- Ссылки -->
        <div class="socials">
            <a href="https://open.spotify.com/artist/3YSO9ev7YtOt3eiqHyNYwW" target="_blank">Spotify</a>
            <a href="https://soundcloud.com/cryforrme" target="_blank">SoundCloud</a>
            <a href="https://t.me/mywristscryforme" target="_blank">Telegram</a>
            <a href="mailto:info@cry4me.com">Email</a>
        </div>

        <!-- Кнопки действий -->
        <div class="actions">
            <button class="btn" id="btn-releases">Релизы</button>
            <!-- Атрибут download указывает браузеру скачать файл -->
            <a href="discography.zip" class="btn" id="btn-download" download>Скачать всё</a>
        </div>

        <!-- Сетка квадратов (9 штук) -->
        <div class="releases-grid" id="grid">
            <!-- Альбом 1 -->
            <a href="#" class="album">
                <img src="cover1.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 1</span>
            </a>
            <!-- Альбом 2 -->
            <a href="#" class="album">
                <img src="cover2.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 2</span>
            </a>
            <!-- Альбом 3 -->
            <a href="#" class="album">
                <img src="cover3.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 3</span>
            </a>
            <!-- Альбом 4 -->
            <a href="#" class="album">
                <img src="cover4.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 4</span>
            </a>
            <!-- Альбом 5 -->
            <a href="#" class="album">
                <img src="cover5.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 5</span>
            </a>
            <!-- Альбом 6 -->
            <a href="#" class="album">
                <img src="cover6.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 6</span>
            </a>
            <!-- Альбом 7 -->
            <a href="#" class="album">
                <img src="cover7.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 7</span>
            </a>
            <!-- Альбом 8 -->
            <a href="#" class="album">
                <img src="cover8.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 8</span>
            </a>
            <!-- Альбом 9 -->
            <a href="#" class="album">
                <img src="cover9.jpg" alt="" onerror="this.style.display='none'">
                <span class="album-title">Album 9</span>
            </a>
        </div>
    </main>

    <script>
        // --- ЛОГИКА ОТКРЫТИЯ РЕЛИЗОВ ---
        const btnReleases = document.getElementById('btn-releases');
        const grid = document.getElementById('grid');

        btnReleases.addEventListener('click', () => {
            grid.classList.toggle('active');
        });

        // --- ЛОГИКА СМЕНЫ ЯЗЫКА ---
        let currentLang = 'ru';
        const langToggle = document.getElementById('lang-toggle');
        const btnDownload = document.getElementById('btn-download');

        // Словари для перевода
        const dict = {
            ru: {
                releases: "РЕЛИЗЫ",
                download: "СКАЧАТЬ ВСЁ"
            },
            en: {
                releases: "RELEASES",
                download: "DOWNLOAD ALL"
            }
        };

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            
            // Меняем текст на кнопках
            btnReleases.innerText = dict[currentLang].releases;
            btnDownload.innerText = dict[currentLang].download;
            
            // Если нужно, чтобы кнопка показывала текущий язык
            // langToggle.innerText = currentLang === 'ru' ? 'RU / EN' : 'EN / RU';
        });
    </script>
</body>
</html>
